services:
  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: voucher_db
      POSTGRES_USER: voucher
      POSTGRES_PASSWORD: voucher
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voucher -d voucher_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes: [postgres_data:/var/lib/postgresql/data]
  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://voucher:voucher@postgres:5432/voucher_db?schema=public
      JWT_ACCESS_SECRET: change-this-development-access-secret-to-a-long-random-value
      JWT_REFRESH_SECRET: change-this-development-refresh-secret-to-a-long-random-value
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["4000:4000"]
  frontend:
    build:
      context: ./frontend
      args: { VITE_API_URL: http://localhost:4000/api/v1 }
    depends_on: [backend]
    ports: ["8080:8080"]
volumes:
  postgres_data:
