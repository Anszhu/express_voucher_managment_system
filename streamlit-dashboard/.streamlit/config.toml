[theme]
base = "dark"
primaryColor = "#6366F1"
backgroundColor = "#0a0a0f"
secondaryBackgroundColor = "#14141f"
textColor = "#f1f5f9"
font = "sans serif"

[server]
maxUploadSize = 10
enableCORS = true

[browser]
gatherUsageStats = false

[runner]
fastReruns = true

[client]
showErrorDetails = false
toolbarMode = "minimal"
